<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Linux Analysis Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 타이틀바 ── -->
  <header class="titlebar">
    <div class="titlebar-brand">
      <span class="brand-name">Linux Analysis Viewer</span>
    </div>
    <div class="titlebar-center">
      <span id="db-path" class="db-path">데이터베이스를 선택하세요</span>
    </div>
    <div class="titlebar-actions">
      <button id="btn-global-search" class="btn btn-ghost" title="전체 검색 (Ctrl+Shift+F)">
        전체 검색
      </button>
      <button id="btn-open" class="btn btn-primary">DB 열기</button>
    </div>
  </header>

  <!-- ── 메인 레이아웃 ── -->
  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div id="sidebar-content" class="sidebar-content">
        <div class="sidebar-empty">
          <p>DB를 열면 목록이<br/>표시됩니다.</p>
        </div>
      </div>
    </aside>

    <!-- 콘텐츠 영역 -->
    <main class="content">

      <!-- 빈 화면 (DB 미선택) -->
      <div id="welcome" class="welcome">
        <div class="welcome-inner">
          <h2>Linux Analysis Viewer</h2>
          <p>parser.db 를 열어 파싱 결과를 확인하세요.</p>
          <button class="btn btn-primary btn-lg" id="btn-open-2">DB 열기</button>
          <p class="welcome-hint hidden" id="auto-hint">
            프로젝트 루트에서 <code>parser.db</code>를 자동 감지했습니다.
          </p>
        </div>
      </div>

      <!-- 시스템 정보 뷰 -->
      <div id="sysinfo-view" class="sysinfo-view hidden"></div>

      <!-- 아티팩트 뷰 (대시보드 + 타입 필터 + 테이블) -->
      <div id="artifact-view" class="artifact-view hidden">

        <!-- 대시보드 -->
        <div id="artifact-dashboard" class="artifact-dashboard"></div>

        <!-- 타입 필터 바 -->
        <div id="artifact-type-bar" class="artifact-type-bar hidden">
          <div class="atb-quick" id="artifact-quick-filters"></div>
          <div class="atb-types" id="artifact-type-chips"></div>
        </div>

        <!-- 테이블 툴바 -->
        <div class="toolbar artifact-toolbar">
          <div class="toolbar-left">
            <h2 id="artifact-title" class="table-title">—</h2>
            <span id="artifact-badge" class="badge">0건</span>
            <div id="artifact-filter-tag" class="active-filter-tag hidden">
              <span id="artifact-filter-label" class="filter-tag-label"></span>
              <button id="artifact-filter-clear" class="btn-icon" title="필터 해제">×</button>
            </div>
          </div>
          <div class="toolbar-right">
            <div class="search-wrap">
              <input id="artifact-search" class="search-input" type="text"
                     placeholder='검색  (예: error  !debug  ="2026-02-02 01:01")'
                     title='포함: error · 제외: !debug · 정확히: =200 · 공백 포함은 "따옴표" 로 묶기 · 토큰 사이는 AND'
                     autocomplete="off" spellcheck="false" />
              <button id="artifact-search-clear" class="btn-icon hidden">×</button>
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-wrap">
          <div id="artifact-data-table" class="data-table"></div>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination">
          <button id="artifact-btn-prev" class="btn btn-ghost" disabled>‹ 이전</button>
          <span id="artifact-page-info" class="page-info">1 / 1</span>
          <button id="artifact-btn-next" class="btn btn-ghost" disabled>다음 ›</button>
          <span id="artifact-pagination-info" class="pagination-count"></span>
        </div>

      </div>

      <!-- 탭 데이터 없음 화면 -->
      <div id="tab-empty" class="tab-empty hidden">
        <div class="tab-empty-inner">
          <h3 id="tab-empty-title">데이터 없음</h3>
          <p id="tab-empty-desc">이 로그 파일이 수집되지 않았거나 파싱 데이터가 없습니다.</p>
        </div>
      </div>

      <!-- 일반 테이블 뷰 -->
      <div id="table-view" class="table-view hidden">

        <!-- 공통(자동) 대시보드 -->
        <div id="table-dashboard" class="artifact-dashboard table-dashboard"></div>

        <!-- 툴바 -->
        <div class="toolbar">
          <div class="toolbar-left">
            <h2 id="table-title" class="table-title">—</h2>
            <span id="total-badge" class="badge">0건</span>

            <!-- 날짜 범위 필터 -->
            <div id="tl-date-filter" class="tl-date-filter hidden">
              <span class="tl-df-sep"></span>
              <input type="date" id="tl-date-from" class="tl-date-input" title="시작일" />
              <span class="tl-df-dash">—</span>
              <input type="date" id="tl-date-to"   class="tl-date-input" title="종료일" />
              <button id="tl-date-clear" class="tl-date-clear-btn hidden" title="날짜 초기화">×</button>
            </div>
          </div>
          <div class="toolbar-right">
            <div class="search-wrap">
              <input id="search-input" class="search-input" type="text"
                     placeholder='검색  (예: error  !debug  ="2026-02-02 01:01")'
                     title='포함: error · 제외: !debug · 정확히: =200 · 공백 포함은 "따옴표" 로 묶기 · 토큰 사이는 AND'
                     autocomplete="off" spellcheck="false" />
              <button id="btn-clear" class="btn-icon hidden">×</button>
            </div>
          </div>
        </div>

        <!-- 데이터 테이블 -->
        <div class="table-wrap">
          <div id="data-table" class="data-table"></div>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination">
          <button id="btn-prev" class="btn btn-ghost" disabled>‹ 이전</button>
          <span id="page-info" class="page-info">1 / 1</span>
          <button id="btn-next" class="btn btn-ghost" disabled>다음 ›</button>
          <span id="pagination-info" class="pagination-count"></span>
        </div>
      </div>

    </main>
  </div>

  <!-- ── 상태바 ── -->
  <footer class="statusbar">
    <span id="status-left">준비</span>
    <span id="status-right" class="status-right"></span>
  </footer>

  <!-- ── 행 상세 모달 ── -->
  <div id="row-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">행 상세 정보</span>
        <span class="modal-hint">텍스트를 드래그하면 URL · Base64 디코드</span>
        <button class="modal-close" id="modal-close" title="닫기">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ── 디코드 팝업 (모달 내 텍스트 선택 시) ── -->
  <div id="decode-popup" class="decode-popup hidden" role="dialog" aria-label="디코드">
    <div class="dp-header">
      <span class="dp-title">디코드</span>
      <button id="dp-close" class="dp-x" title="닫기 (Esc)" aria-label="닫기">×</button>
    </div>
    <div class="dp-source">
      <div class="dp-source-label">선택된 텍스트</div>
      <div id="dp-source-text" class="dp-source-text"></div>
    </div>
    <div class="dp-actions">
      <button id="dp-url"  class="dp-action" title="URL 인코딩(%xx) 디코드">
        <span class="dp-action-name">URL</span>
        <span class="dp-action-sub">%xx → 문자</span>
      </button>
      <button id="dp-b64"  class="dp-action" title="Base64 디코드 (URL-safe·패딩 자동 보정)">
        <span class="dp-action-name">Base64</span>
        <span class="dp-action-sub">B64 → 원본</span>
      </button>
      <button id="dp-copy" class="dp-action dp-action-ghost" title="선택 원본 복사">
        <span class="dp-action-name">복사</span>
        <span class="dp-action-sub">원본</span>
      </button>
    </div>
    <div id="dp-result" class="dp-result hidden">
      <div class="dp-result-head">
        <span id="dp-result-label" class="dp-result-label"></span>
        <button id="dp-result-copy" class="dp-result-copy" title="결과 복사">결과 복사</button>
      </div>
      <div id="dp-result-val" class="dp-result-val"></div>
    </div>
  </div>

  <!-- ── 전체 검색 패널 ── -->
  <div id="gs-panel" class="gs-panel hidden" role="dialog" aria-modal="true" aria-label="전체 검색">
    <div class="gs-overlay" id="gs-overlay"></div>
    <div class="gs-box">
      <div class="gs-header">
        <input id="gs-input" class="gs-input" type="text"
               placeholder="전체 테이블에서 검색…" autocomplete="off" spellcheck="false" />
        <span id="gs-count-badge" class="gs-count-badge hidden"></span>
        <button id="gs-close" class="btn-icon" title="닫기 (Esc)">×</button>
      </div>
      <div id="gs-body" class="gs-body">
        <div class="gs-hint">검색어를 입력하면 모든 파싱 테이블에서 결과를 찾아드립니다.</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
