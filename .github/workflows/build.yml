name: Build (Windows)

on:
  push:
    tags:
      - 'v*'          # v1.0.0 태그 push 시 자동 빌드
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

jobs:
  # ── Python 분석기 → .exe ──────────────────────────────
  build-python:
    name: Python → linux-analyzer.exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller linux-analyzer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-analyzer.exe
          path: dist/linux-analyzer.exe

  # ── Electron GUI → .exe 설치파일 ─────────────────────
  build-electron:
    name: Electron → Setup.exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & rebuild native modules
        working-directory: gui
        run: npm install

      - name: Build Electron app (Windows)
        working-directory: gui
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            gui/dist/*.exe
            gui/dist/*.blockmap

  # ── GitHub Release 자동 생성 ─────────────────────────
  release:
    name: Create Release
    needs: [build-python, build-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # Release 생성 및 파일 업로드 권한

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
