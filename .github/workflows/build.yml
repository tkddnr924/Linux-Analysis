name: Build (Windows)

on:
  push:
    tags:
      - 'v*'          # v1.0.0 태그 push 시 자동 빌드
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

# Node 20 deprecation 대응 — JS 액션을 Node 24 런타임에서 실행 (2026-06-16 강제 전환의 조기 opt-in).
# 이걸 켜두면 action.yml 이 node20 으로 선언된 액션(upload/download-artifact 등)도 Node 24 에서 돌아
# deprecation 경고가 사라지고, 강제 전환일에 대비한 호환성 검증도 함께 됨.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Python 분석기 → .exe ──────────────────────────────
  build-python:
    name: Python → linux-analyzer.exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller linux-analyzer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-analyzer.exe
          path: dist/linux-analyzer.exe

  # ── Electron GUI → .exe 설치파일 ─────────────────────
  build-electron:
    name: Electron → Setup.exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install & rebuild native modules
        working-directory: gui
        run: npm install

      - name: Build Electron app (Windows)
        working-directory: gui
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          # portable 타겟 단일 산출물만 (Setup/installer·blockmap 없음)
          path: gui/dist/*.exe

  # ── GitHub Release 자동 생성 ─────────────────────────
  release:
    name: Create Release
    needs: [build-python, build-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # Release 생성 및 파일 업로드 권한

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
