# Linux-Analysis 설정 파일
# - 이 파일은 linux-analyzer.exe 와 같은 폴더에 두면 자동으로 읽힙니다.
# - 비어 있는 값은 "기본값/스킵" 의미.
# - 우선순위: 환경변수 > .ipinfo_token 파일 > 이 config.ini

[ipinfo]
# IPinfo 토큰 (선택)
#   비워두면 무토큰 한도(~1000/day)로 동작.
#   더 큰 한도가 필요하면 https://ipinfo.io/signup 에서 무료 가입 후
#   여기에 토큰을 한 줄로 넣으면 됩니다. (예: token = abc123def456)
#
# 주의: 토큰이 들어간 config.ini 는 절대 git/공개 저장소에 커밋하지 마세요.
token =
